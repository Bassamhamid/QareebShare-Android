name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android 17 SDK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-37.0" \
            "build-tools;37.0.0"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Verify host and join architecture
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/check-final.sh
          bash scripts/check-host-join-batch1.sh

      - name: Build installable debug APK
        shell: bash
        run: |
          set -euo pipefail
          gradle \
            --no-daemon \
            --no-configuration-cache \
            :app:assembleDebug

      - name: Run strict Android Lint
        shell: bash
        run: |
          set -euo pipefail
          gradle \
            --no-daemon \
            --no-configuration-cache \
            :app:lintDebug

      - name: Upload installable APK
        uses: actions/upload-artifact@v6
        with:
          name: qareeb-share-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Lint reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: qareeb-share-lint-reports
          path: |
            app/build/reports/lint-results-debug.*
            app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt
          if-no-files-found: warn
          retention-days: 14
