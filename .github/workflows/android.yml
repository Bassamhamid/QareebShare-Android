name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android 17 SDK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-37.0" \
            "build-tools;37.0.0"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Verify project
        shell: bash
        run: bash scripts/check-final.sh

      - name: Lint and build APKs
        shell: bash
        run: |
          set -euo pipefail
          gradle \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace \
            :app:lintDebug \
            :app:assembleDebug \
            :app:assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: qareeb-share-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14
